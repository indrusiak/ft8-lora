; FT8 over LoRa - Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262 + SSD1306)
[env:heltec_wifi_lora_32_v3]
platform = espressif32
board = heltec_wifi_lora_32_v3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -mfix-esp32-psram-cache-issue

; After the normal firmware.bin is built, also emit a single merged image
; (ft8lora.bin) flashable in one shot at offset 0x0 -- the artifact to publish.
extra_scripts = post:post_build.py

lib_deps =
    ; Proven OLED path for the V3 (reset-pin fix lives in heltec_display.h)
    https://github.com/meshtastic/esp8266-oled-ssd1306/archive/6bfd1f135e1ebe37afd6050bb4b9964cea3fcfda.zip
    jgromes/RadioLib @ ^6.4.0
    bblanchon/ArduinoJson @ ^7.0.0
